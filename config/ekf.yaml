ekf_filter_node:
  ros__parameters:

    frequency: 30.0
    two_d_mode: true

    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Wheel odometry (from your Aria node later)
    odom0: /odom
    odom0_config: [true, true, false,
                   false, false, true,
                   true, false, false,
                   false, false, true,
                   false, false, false]

    # IMU
    imu0: /imu/data_raw
    imu0_config: [false, false, false, # position
                  false, false, false, # orientation
                  false, false, false, # linear velocity
                  false, false, true,  # angular velocity
                  true, false, false]  # linear accel

    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true